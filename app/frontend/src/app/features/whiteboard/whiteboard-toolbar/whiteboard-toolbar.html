<aside class="toolbar" role="toolbar" [attr.aria-label]="'whiteboard.tool.select' | translate">
  <!-- Group 1: Drawing/Creation tools -->

  <!-- 1. Select -->
  <button
    class="tool-btn"
    [class.active]="activeTool() === 'select'"
    (click)="selectTool('select')"
    [title]="'whiteboard.tool.select' | translate"
    data-testid="tool-select"
  >
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="m3 3 7.07 16.97 2.51-7.39 7.39-2.51L3 3z"/>
      <path d="m13 13 6 6"/>
    </svg>
  </button>

  <!-- 2. Shape -->
  <div class="tool-group">
    <button
      class="tool-btn"
      [class.active]="isShapeActive()"
      (click)="toggleShapeMenu()"
      [title]="'whiteboard.tool.shape' | translate"
      data-testid="tool-shape"
    >
      <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor" stroke="none">
        <rect x="5" y="5" width="14" height="14" rx="2"/>
      </svg>
    </button>
    @if (showShapeMenu()) {
      <div class="popup-menu shape-menu">
        <button class="shape-option" (click)="selectShape('rectangle')" data-testid="shape-rect">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>
        </button>
        <button class="shape-option" (click)="selectShape('ellipse')" data-testid="shape-ellipse">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><ellipse cx="12" cy="12" rx="10" ry="8"/></svg>
        </button>
        <button class="shape-option" (click)="selectShape('line')" data-testid="shape-line">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="19" x2="19" y2="5"/></svg>
        </button>
      </div>
    }
  </div>

  <!-- 3. Text -->
  <button
    class="tool-btn"
    [class.active]="activeTool() === 'text'"
    (click)="selectTool('text')"
    [title]="'whiteboard.tool.text' | translate"
    data-testid="tool-text"
  >
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="4 7 4 4 20 4 20 7"/>
      <line x1="9" y1="20" x2="15" y2="20"/>
      <line x1="12" y1="4" x2="12" y2="20"/>
    </svg>
  </button>

  <!-- 4. Pen -->
  <button
    class="tool-btn"
    [class.active]="activeTool() === 'pen'"
    (click)="selectTool('pen')"
    [title]="'whiteboard.tool.pen' | translate"
    data-testid="tool-pen"
  >
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/>
    </svg>
  </button>

  <!-- 5. Image -->
  <button
    class="tool-btn"
    (click)="onImageClick()"
    [title]="'whiteboard.tool.image' | translate"
    data-testid="tool-image"
  >
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="3" width="18" height="18" rx="2"/>
      <circle cx="8.5" cy="8.5" r="1.5"/>
      <polyline points="21 15 16 10 5 21"/>
    </svg>
  </button>

  <!-- 6. Link -->
  <button
    class="tool-btn"
    (click)="onLinkClick()"
    [title]="'whiteboard.tool.link' | translate"
    data-testid="tool-link"
  >
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
      <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
    </svg>
  </button>

  <div class="toolbar-divider"></div>

  <!-- Group 2: Collaboration/View tools -->

  <!-- 7. Comment -->
  <button
    class="tool-btn"
    (click)="onCommentClick()"
    [title]="'whiteboard.tool.comment' | translate"
    data-testid="tool-comment"
  >
    <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor" stroke="none">
      <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
    </svg>
  </button>

  <!-- 8. More -->
  <div class="tool-group">
    <button
      class="tool-btn"
      [class.active]="activeTool() === 'eraser'"
      (click)="toggleMoreMenu()"
      [title]="'whiteboard.tool.more' | translate"
      data-testid="tool-more"
    >
      <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor" stroke="none">
        <circle cx="6" cy="12" r="2"/>
        <circle cx="12" cy="12" r="2"/>
        <circle cx="18" cy="12" r="2"/>
      </svg>
    </button>
    @if (showMoreMenu()) {
      <div class="popup-menu more-menu">
        <!-- Eraser -->
        <button
          class="more-option"
          [class.active]="activeTool() === 'eraser'"
          (click)="selectEraser()"
          data-testid="more-eraser"
        >
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="m7 21-4.3-4.3c-1-1-1-2.5 0-3.4l9.6-9.6c1-1 2.5-1 3.4 0l5.6 5.6c1 1 1 2.5 0 3.4L13 21"/>
            <path d="M22 21H7"/>
            <path d="m5 11 9 9"/>
          </svg>
          <span>{{ 'whiteboard.tool.eraser' | translate }}</span>
        </button>

        <!-- Color picker -->
        <div class="more-color-section">
          <button class="more-option" (click)="toggleColorPicker()">
            <span class="color-swatch" [style.background-color]="activeColor()"></span>
            <span>{{ 'whiteboard.tool.color' | translate }}</span>
          </button>
          @if (showColorPicker()) {
            <div class="color-grid">
              @for (color of colors; track color) {
                <button
                  class="color-option"
                  [style.background-color]="color"
                  [class.active]="activeColor() === color"
                  (click)="selectColor(color)"
                ></button>
              }
              <input
                type="color"
                class="color-custom"
                [value]="activeColor()"
                (change)="onCustomColor($event)"
                data-testid="custom-color-input"
              />
            </div>
          }
        </div>
      </div>
    }
  </div>
</aside>
