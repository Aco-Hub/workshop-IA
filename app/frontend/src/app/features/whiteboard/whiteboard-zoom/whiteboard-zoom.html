<nav class="zoom-controls" role="toolbar" aria-label="Zoom controls">
  <button
    class="zoom-btn"
    (click)="onZoomOut()"
    [title]="'whiteboard.zoom_out' | translate"
    data-testid="zoom-out"
  >
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <line x1="5" y1="12" x2="19" y2="12"/>
    </svg>
  </button>
  <button class="zoom-level" (click)="onReset()" data-testid="zoom-level">
    {{ getZoomPercent() }}%
  </button>
  <button
    class="zoom-btn"
    (click)="onZoomIn()"
    [title]="'whiteboard.zoom_in' | translate"
    data-testid="zoom-in"
  >
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <line x1="12" y1="5" x2="12" y2="19"/>
      <line x1="5" y1="12" x2="19" y2="12"/>
    </svg>
  </button>
  <button class="zoom-btn help-btn" data-testid="zoom-help">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"/>
      <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/>
      <line x1="12" y1="17" x2="12.01" y2="17"/>
    </svg>
  </button>
</nav>
