server:
  port: 8082

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/timesheet_v3
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  mail:
    host: ${SMTP_HOST:smtp.gmail.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

app:
  jwt:
    secret-key: ${JWT_SECRET_KEY:dGhpcyBpcyBhIHZlcnkgc2VjdXJlIHNlY3JldCBrZXkgZm9yIGp3dCB0b2tlbiBnZW5lcmF0aW9u}
    expiration: ${JWT_EXPIRATION:86400000}
    invite-expiration: ${JWT_INVITE_EXPIRATION:604800000}
  email:
    from: ${APP_EMAIL_FROM:noreply@timesheet.local}
  base-url: ${APP_BASE_URL:http://localhost:5173}

management:
  endpoint:
    health:
      show-details: never
  health:
    mail:
      enabled: false

discord:
  client-id: ${DISCORD_CLIENT_ID:}
  client-secret: ${DISCORD_CLIENT_SECRET:}
  redirect-uri: ${DISCORD_REDIRECT_URI:http://localhost:8080/api/auth/discord/callback}
